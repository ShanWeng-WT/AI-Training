<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AI 課程目錄 - PDD3 AI Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="style.css" rel="stylesheet"/>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            background-color: var(--bg-color, #0d1117);
            overflow-y: auto;
        }
        .index-container {
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            display: flex;
            flex-direction: column;
        }
        .course-link {
            text-decoration: none;
            color: inherit;
            display: block;
            height: 100%;
        }
        .sub-card {
            cursor: pointer;
            transition: all 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .sub-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
            border-color: rgba(0, 255, 204, 0.8) !important;
        }
        .loading-text {
            text-align: center;
            color: #8b949e;
            margin-top: 50px;
            font-size: 1.2rem;
        }
        /* Override grid to be more compact for 12+ courses */
        .dashboard-grid.auto-fit {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        /* Override default sub-card padding to be more compact */
        .index-container .sub-card {
            padding: 16px 20px;
            min-height: 120px;
        }
        .status-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            border: 1px solid rgba(88, 166, 255, 0.3);
            width: fit-content;
        }
        .sub-card:hover .status-badge {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            border-color: rgba(0, 255, 204, 0.3);
        }
        .course-action {
            margin-top: auto;
            padding-top: 15px;
            color: #8b949e;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }
        .sub-card:hover .course-action {
            color: #00ffcc;
        }
        .course-action svg {
            transition: transform 0.3s;
        }
        .sub-card:hover .course-action svg {
            transform: translateX(5px);
        }
    </style>
</head>
<body>
    <div class="index-container card console-dashboard-layout">
        <h1 style="border-bottom: 1px solid #30363d; padding-bottom: 20px; margin-bottom: 40px; font-size: 2rem;">
            📚 PDD3 AI 教育訓練
        </h1>
        
        <div id="course-grid" class="dashboard-grid auto-fit">
            <!-- 課程卡片將由 JavaScript 自動生成 -->
        </div>
        
    <script src="courses.js"></script>
    <script>
        function loadCourses() {
            const courseGrid = document.getElementById('course-grid');
            
            // 檢查 courses.js 是否有成功載入
            if (typeof COURSE_LIST === 'undefined') {
                courseGrid.innerHTML = `
                    <div style="grid-column: 1 / -1; color: #ff7b72; background: rgba(255, 123, 114, 0.1); padding: 20px; border-radius: 8px; border: 1px solid rgba(255, 123, 114, 0.3);">
                        ⚠️ <b>讀取設定檔失敗</b><br><br>
                        找不到 \`courses.js\` 檔案，或是檔案內容有語法錯誤。<br>
                        請確認您是否不小心刪除了 \`courses.js\`。
                    </div>
                `;
                return;
            }

            // 清空畫面
            courseGrid.innerHTML = '';

            // 根據 COURSE_LIST 動態產生卡片
            COURSE_LIST.forEach(course => {
                const handoutFilename = `Class${course.id}_Handout.html`;
                
                const cardHtml = `
                    <a href="${handoutFilename}" class="course-link">
                        <div class="sub-card" style="border-color: rgba(88, 166, 255, 0.3);">
                            <div class="status-badge">Class ${course.id}</div>
                            <h3 style="margin-top: 0; font-size: 1.1rem; line-height: 1.3;">${course.title}</h3>
                            
                            <div class="course-action">
                                進入講義
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="5" y1="12" x2="19" y2="12"></line>
                                    <polyline points="12 5 19 12 12 19"></polyline>
                                </svg>
                            </div>
                        </div>
                    </a>
                `;
                
                courseGrid.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 啟動載入
        loadCourses();
    </script>
</body>
</html>
