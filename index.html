<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AI 課程目錄 - PDD3 AI Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="Scripts/style.css" rel="stylesheet"/>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 確保內容貼近上方 */
            align-items: center; /* 確保內容水平置中 */
            min-height: 100vh;
            padding: 40px 20px;
            background-color: var(--bg-color, #0d1117);
            background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 204, 0.05) 0%, transparent 50%);
            overflow-y: auto;
            font-family: 'Outfit', 'Inter', sans-serif;
        }
        .index-container {
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .header-row {
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
            margin-bottom: 40px;
        }
        .header-row h1 {
            border: none;
            padding: 0;
            margin: 0;
            line-height: 1.2;
            text-align: center;
        }

        .course-link { text-decoration: none; color: inherit; display: block; height: 100%; }

        /* Shared Card Styles */
        .glass-card {
            background: rgba(22, 27, 34, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(88, 166, 255, 0.2);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            height: 100%;
            z-index: 1;
        }
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, rgba(88,166,255,0.5), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
            z-index: 2;
        }
        .glass-card:hover::before { transform: translateX(100%); }
        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 255, 204, 0.6);
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.15);
            background: rgba(30, 36, 45, 0.8);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 800;
            margin-bottom: 16px;
            background: rgba(88, 166, 255, 0.1);
            color: #58a6ff;
            border: 1px solid rgba(88, 166, 255, 0.3);
            width: fit-content;
            letter-spacing: 1px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .glass-card:hover .status-badge {
            background: rgba(0, 255, 204, 0.15);
            color: #00ffcc;
            border-color: rgba(0, 255, 204, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        .course-action {
            margin-top: auto;
            padding-top: 20px;
            color: #8b949e;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .glass-card:hover .course-action { color: #00ffcc; }
        .course-action svg { transition: transform 0.3s; }
        .glass-card:hover .course-action svg { transform: translateX(6px); }
        .course-title {
            margin-top: 0;
            font-size: 1.3rem;
            line-height: 1.4;
            color: #e6edf3;
            transition: color 0.3s;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
        }
        .glass-card:hover .course-title { color: #fff; }

        /* ================= Layout: Timeline ================= */
        .layout-timeline {
            position: relative;
            max-width: 900px; 
            margin: 0 auto;
            padding: 40px 0;
            width: 100%;
        }
        .layout-timeline::after {
            content: ''; position: absolute;
            width: 4px; background: linear-gradient(to bottom, #58a6ff, #00ffcc);
            top: 0; bottom: 0; left: 50%; margin-left: -2px;
            border-radius: 2px; opacity: 0.3;
        }
        .timeline-item {
            padding: 10px 40px;
            position: relative;
            width: 50%;
            margin-bottom: 20px;
            display: flex;
            /* 已移除動畫與預設透明度，確保直接顯示 */
        }
        
        .timeline-item:nth-child(even) { left: 50%; justify-content: flex-start; }
        .timeline-item:nth-child(odd) { left: 0; justify-content: flex-end; }
        
        .timeline-item-content {
            width: 100%;
        }

        .timeline-node {
            position: absolute;
            width: 20px; height: 20px;
            background: #0d1117;
            border: 4px solid #58a6ff;
            border-radius: 50%;
            top: 50%; transform: translateY(-50%);
            z-index: 2;
            transition: all 0.4s;
        }
        .timeline-item:nth-child(odd) .timeline-node { right: -10px; }
        .timeline-item:nth-child(even) .timeline-node { left: -10px; }
        
        .timeline-item:hover .timeline-node {
            border-color: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            transform: translateY(-50%) scale(1.3);
        }

        /* Responsive overrides */
        @media (max-width: 768px) {
            .header-row { flex-direction: column; gap: 20px; align-items: flex-start; }
            .header-row h1 { text-align: left; }
            .layout-timeline::after { left: 20px; }
            .timeline-item { width: 100% !important; left: 0 !important; padding-left: 50px !important; justify-content: flex-start !important; }
            .timeline-item .timeline-node { left: 10px !important; right: auto !important; }
        }
        /* Floating Link Box */
        .fixed-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            display: flex;
            justify-content: center;
            z-index: 1000;
        }
        .fixed-timeline-wrapper {
            width: 100%;
            max-width: 1200px; /* 對齊到外部背景卡片 (.index-container) 的邊界 */
            position: relative;
        }
        .floating-link {
            pointer-events: auto;
            position: absolute;
            right: 10px; /* 貼著邊界 */
            top: 50%;
            transform: translateY(-50%);
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 16px;
            padding: 15px 10px;
            text-decoration: none;
            color: #e6edf3;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .floating-link:hover {
            transform: translateY(-50%) translateX(-5px);
            border-color: rgba(0, 255, 204, 0.6);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
            background: rgba(30, 36, 45, 0.9);
        }
        .floating-link svg {
            width: 24px;
            height: 24px;
            stroke: #00ffcc;
        }
        .floating-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            letter-spacing: 2px;
            font-family: 'Inter', sans-serif;
            font-size: 1.1rem;
        }
        @media (max-width: 768px) {
            .floating-link {
                position: fixed;
                top: auto;
                bottom: 20px;
                right: 20px;
                transform: none;
                flex-direction: row;
                padding: 10px 20px;
                border-radius: 30px;
            }
            .floating-link:hover {
                transform: translateY(-5px);
            }
            .floating-text {
                writing-mode: horizontal-tb;
                letter-spacing: normal;
            }
        }
    </style>
</head>
<body>
    <div class="index-container">
        <div class="header-row">
            <h1 style="font-size: 2.2rem; background: -webkit-linear-gradient(45deg, #00ffcc, #58a6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                💪 PDD3 AI 教育訓練
            </h1>
        </div>
        
        <div id="course-container" class="layout-timeline">
            <!-- 課程卡片將由 JavaScript 自動生成 -->
        </div>
        
    </div>

    <script src="Scripts/courses.js"></script>
    <script>
        function renderCourses() {
            const container = document.getElementById('course-container');
            
            if (typeof COURSE_LIST === 'undefined') {
                container.innerHTML = `
                    <div style="color: #ff7b72; background: rgba(255, 123, 114, 0.1); padding: 20px; border-radius: 8px; border: 1px solid rgba(255, 123, 114, 0.3);">
                        ⚠️ <b>讀取設定檔失敗</b><br><br>
                        找不到 \`courses.js\` 檔案，或是檔案內容有語法錯誤。<br>
                        請確認您是否不小心刪除了 \`courses.js\`。
                    </div>
                `;
                return;
            }

            container.innerHTML = '';

            COURSE_LIST.forEach((course, index) => {
                const handoutFilename = `Class${course.id}_Handout.html`;
                
                const cardHtml = `
                    <div class="timeline-item">
                        <div class="timeline-node"></div>
                        <div class="timeline-item-content">
                            <a href="${handoutFilename}" class="course-link">
                                <div class="glass-card">
                                    <div class="status-badge">Class ${course.id}</div>
                                    <h3 class="course-title">${course.title}</h3>
                                    
                                    <div class="course-action">
                                        進入講義
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="5" y1="12" x2="19" y2="12"></line>
                                            <polyline points="12 5 19 12 12 19"></polyline>
                                        </svg>
                                    </div>
                                </div>
                            </a>
                        </div>
                    </div>
                `;
                
                container.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        // 初始化
        renderCourses();
    </script>

    <!-- 浮動連結區塊 (對齊時間軸右側) -->
    <div class="fixed-overlay">
        <div class="fixed-timeline-wrapper">
            <a href="https://ai-dict.gh.miniasp.com/?fbclid=IwdGRjcARj5wpjbGNrBGPlS2V4dG4DYWVtAjExAHNydGMGYXBwX2lkDDM1MDY4NTUzMTcyOAABHjrVlksauGpgZuBddlhIKV_U3shjLRmiGHMehuy8bGJo8IP29LynqoOpggy0_aem_4A7X2BZBdEXx1XkDkxQ1lA" target="_blank" class="floating-link" title="AI 字典">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                </svg>
                <span class="floating-text">術語辭典</span>
            </a>
        </div>
    </div>
</body>
</html>
